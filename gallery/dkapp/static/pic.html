<!DOCTYPE html>
<html>
<head>
    <title>My Image Viewer</title>

    <style>
        body {
            margin: 0;
            font-family: Verdana;
            background-color: #eaa2e7;
            color: white;
            text-align: center;
        }

        .header {
            background-color: #770808;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .card {
            width: 350px;
            margin: 80px auto;
            background-color: #020243;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgb(41, 2, 2);
        }

        img {
            width: 100%;
            height: 350px;
            border-radius: 100px;
        }

        p {
            margin-top: 10px;
            font-size: 16px;
        }

        button {
            margin: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background-color: #dd4bfa;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #7bd2d8;
        }

        
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #d9d38b;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="header">
    My Interactive Gallery
</div>

<div class="card">
    <img id="img" src="img1.jpg">
    <p id="caption">Image 1</p>

    <button onclick="prev()">Previous</button>
    <button onclick="next()">Next</button>
</div>

<div class="footer">
    Created by Dharshan Sanjay
    <br>
    Reg No: 212225040070
</div>

<script>
    let images = ["me.jpg", "flag.jpg", "ds.jpg", "leela.jpg", "st 5.jpg"];
    let captions = [ "Me","TVK Flag", "DS", "Sreeleela", "Stranger Things"];

    let i = 0;

    function show() {
        document.getElementById("img").src = images[i];
        document.getElementById("caption").innerHTML = captions[i];
    }

    function next() {
        i++;
        if (i >= images.length) {
            i = 0;
        }
        show();
    }

    function prev() {
        i--;
        if (i < 0) {
            i = images.length - 1;
        }
        show();
    }
</script>

</body>
</html>
